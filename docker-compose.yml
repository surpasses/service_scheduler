services:
  db:
    image: postgres:16-alpine
    container_name: service_scheduler_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: service_scheduler
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d service_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
